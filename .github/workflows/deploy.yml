name: Deploy Clinic Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/sanbercode-devops-batch-76-final-project
            git pull origin main
            cp -r app/* /var/www/clinic/
            pm2 restart clinic-app
            systemctl restart nginx